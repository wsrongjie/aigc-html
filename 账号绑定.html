<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号绑定 - 个人中心</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --primary: #2f6bff;
        --primary-light: #e8efff;
        --primary-dark: #1f4fd9;
        --success: #16a34a;
        --success-light: #dcfce7;
        --warning: #f59e0b;
        --warning-light: #fef3c7;
        --danger: #dc2626;
        --danger-light: #fee2e2;
        --sidebar-bg: #1C1C1E;
        --sidebar-text: #A1A1AA;
        --sidebar-active: #FFFFFF;
        --card-bg: #FFFFFF;
        --border: #E4E4E7;
        --border-strong: #D4D4D8;
        --text-primary: #18181B;
        --text-secondary: #71717A;
        --text-muted: #A1A1AA;
        --bg: #F7F7F8;
        --radius: 12px;
        --radius-sm: 8px;
        --shadow: 0 1px 3px rgba(0,0,0,0.06);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        display: flex;
        height: 100vh;
        overflow: hidden;
        font-size: 14px;
    }
    button { font: inherit; cursor: pointer; }
    a { text-decoration: none; color: inherit; }

    /* 侧边栏 */
    .sidebar {
        width: 220px; background: var(--sidebar-bg);
        display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo-mark { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
        width: 32px; height: 32px; background: var(--primary);
        border-radius: 8px; display: flex; align-items: center;
        justify-content: center; color: #fff; font-weight: 700; font-size: 14px;
    }
    .logo-text { color: #fff; font-weight: 600; font-size: 15px; }
    .logo-sub { color: var(--sidebar-text); font-size: 11px; margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .nav-section { padding: 8px 0; }
    .nav-section-title {
        padding: 6px 20px; font-size: 14px; color: #A1A1AA; letter-spacing: 0.04em;
        font-weight: 600; cursor: pointer; display: flex; align-items: center;
        justify-content: space-between; user-select: none; transition: color 0.15s;
    }
    .nav-section-title:hover { color: #E4E4E7; }
    .nav-section-title .collapse-icon { font-size: 10px; transition: transform 0.2s; }
    .nav-section-title.collapsed .collapse-icon { transform: rotate(-90deg); }
    .nav-section-children {
        overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s;
        max-height: 400px; opacity: 1;
    }
    .nav-section-children.hidden { max-height: 0; opacity: 0; }
    .nav-sub-item {
        display: flex; align-items: center; gap: 10px; padding: 9px 20px 9px 36px;
        cursor: pointer; color: var(--sidebar-text); transition: all 0.15s;
        border-left: 3px solid transparent; font-size: 13px; text-decoration: none;
    }
    .nav-sub-item:hover { color: #E4E4E7; background: rgba(255,255,255,0.04); }
    .nav-sub-item.active { color: var(--sidebar-active); background: rgba(47,107,255,0.15); border-left-color: var(--primary); }
    .nav-icon { width: 18px; text-align: center; font-size: 15px; }
    .sidebar-bottom { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06); }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
        width: 32px; height: 32px; border-radius: 50%; background: var(--primary);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 13px; font-weight: 600;
    }
    .user-name { color: #E4E4E7; font-size: 13px; }
    .user-role { color: var(--sidebar-text); font-size: 11px; }

    /* 主内容 */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
        height: 56px; background: var(--card-bg); border-bottom: 1px solid var(--border);
        display: flex; align-items: center; padding: 0 28px; flex-shrink: 0; gap: 12px;
    }
    .topbar-title { font-size: 16px; font-weight: 600; }
    .topbar-desc { font-size: 12px; color: var(--text-muted); }
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* 页面头部 */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; }

    /* 平台卡片网格 */
    .platform-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 16px;
    }
    .platform-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        gap: 16px;
        transition: box-shadow 0.2s;
    }
    .platform-card:hover { box-shadow: var(--shadow-md); }

    .platform-icon {
        width: 48px; height: 48px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; flex-shrink: 0;
    }
    .platform-icon {
        width: 48px; height: 48px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; overflow: hidden;
    }
    .platform-icon svg { width: 28px; height: 28px; display: block; }
    .platform-icon.bg-douyin { background: #161823; }
    .platform-icon.bg-kuaishou { background: linear-gradient(135deg, #FF6A00, #EE2D2D); }
    .platform-icon.bg-xiaohongshu { background: #fff; border: 1px solid #eee; }
    .platform-icon.bg-wechat { background: #07C160; }

    .platform-body { flex: 1; min-width: 0; }
    .platform-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .platform-status { font-size: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .status-dot.bound { background: var(--success); }
    .status-dot.unbound { background: var(--text-muted); }
    .status-dot.expired { background: var(--warning); }
    .status-dot.soon { background: var(--text-muted); }
    .status-text.bound { color: var(--success); font-weight: 600; }
    .status-text.unbound { color: var(--text-muted); }
    .status-text.expired { color: var(--warning); font-weight: 600; }
    .status-text.soon { color: var(--text-muted); }

    .platform-user { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .platform-user-avatar {
        width: 24px; height: 24px; border-radius: 50%;
        background: var(--primary-light); color: var(--primary);
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 700;
    }
    .platform-user-name { font-size: 13px; color: var(--text-primary); font-weight: 600; }
    .platform-expire { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .mode-badge {
        display: inline-flex; align-items: center; gap: 3px;
        font-size: 11px; font-weight: 600; padding: 2px 8px;
        border-radius: 4px; margin-left: 8px;
    }
    .mode-badge.redirect { background: #fef3c7; color: #92400e; }
    .mode-badge.auto { background: #dcfce7; color: #166534; }

    .platform-actions { flex-shrink: 0; }
    .btn {
        height: 34px; padding: 0 16px; border-radius: var(--radius-sm);
        font-size: 13px; font-weight: 600; border: 1px solid var(--border);
        background: var(--card-bg); color: var(--text-secondary);
        display: inline-flex; align-items: center; gap: 6px;
        transition: all 0.15s;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn-primary {
        background: var(--primary); color: #fff; border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-success {
        background: var(--success); color: #fff; border-color: var(--success);
    }
    .btn-success:hover { background: #15803d; }
    .btn-warning {
        background: var(--warning); color: #fff; border-color: var(--warning);
    }
    .btn-warning:hover { background: #d97706; }
    .btn-danger {
        background: transparent; color: var(--danger); border-color: var(--danger);
    }
    .btn-danger:hover { background: var(--danger-light); }
    .btn-ghost { border: none; background: transparent; color: var(--text-muted); padding: 0 8px; }
    .btn-ghost:hover { color: var(--danger); }
    .btn-disabled {
        background: #f5f5f5; color: #ccc; border-color: #e8e8e8; cursor: not-allowed;
    }
    .btn-disabled:hover { background: #f5f5f5; color: #ccc; border-color: #e8e8e8; }

    /* 弹窗遮罩 */
    .modal-mask {
        position: fixed; inset: 0; z-index: 80;
        background: rgba(15,23,42,0.52);
        display: none; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-mask.show { display: flex; }
    .modal {
        width: min(440px, 92vw); background: #fff; border-radius: 18px;
        box-shadow: 0 24px 70px rgba(15,23,42,0.26); padding: 28px;
    }
    .modal-icon { text-align: center; margin-bottom: 12px; display: flex; justify-content: center; }
    .modal-icon svg { width: 26px; height: 26px; display: block; }
    .modal-title { text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal-desc { text-align: center; font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
    .modal-scope {
        background: var(--bg); border-radius: 10px; padding: 14px 16px; margin-bottom: 20px;
    }
    .modal-scope-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
    .modal-scope-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-primary); padding: 4px 0; }
    .modal-scope-item .check { color: var(--success); font-weight: 700; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-actions .btn { height: 40px; padding: 0 20px; border-radius: 10px; }

    /* Toast */
    .toast {
        position: fixed; right: 24px; bottom: 24px; z-index: 100; width: 300px;
        background: #111827; color: #fff; border-radius: 12px; padding: 12px 14px;
        box-shadow: 0 16px 40px rgba(15,23,42,0.24); display: none;
    }
    .toast.show { display: block; }
    .toast strong { display: block; margin-bottom: 4px; }
    .toast span { color: #cbd5e1; font-size: 12px; line-height: 1.5; }

    @media (max-width: 768px) {
        .platform-grid { grid-template-columns: 1fr; }
    }
</style>
</head>

<!-- 授权确认弹窗 -->
<div class="modal-mask" id="authModal" onclick="closeModal('authModal')">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-icon" id="authModalIcon">🎵</div>
        <div class="modal-title" id="authModalTitle">授权绑定抖音</div>
            <div class="modal-desc" id="authModalDesc">即将跳转到平台进行授权认证。</div>
        <div class="modal-scope">
            <div class="modal-scope-title">授权后将允许：</div>
            <div class="modal-scope-item"><span class="check">✓</span> 发布视频到你的 <span id="authModalScopePlatform">抖音</span> 账号</div>
            <div class="modal-scope-item"><span class="check">✓</span> 获取你的公开用户信息</div>
            <div class="modal-scope-item"><span class="check">✓</span> 查看视频发布状态</div>
        </div>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal('authModal')">取消</button>
            <button class="btn btn-primary" id="authModalConfirm" onclick="confirmAuth()">前往授权 →</button>
        </div>
    </div>
</div>

<!-- 解绑确认弹窗 -->
<div class="modal-mask" id="unbindModal" onclick="closeModal('unbindModal')">

        <div class="modal-title">确认解绑</div>
        <div class="modal-desc" id="unbindModalDesc">确认解除与「抖音」的绑定？解除后需要重新授权才能分发视频。</div>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal('unbindModal')">再想想</button>
            <button class="btn btn-danger" id="unbindModalConfirm" onclick="confirmUnbind()">确认解绑</button>
        </div>
    </div>
</div>

        wechat: '<svg viewBox="0 0 24 24" fill="none"><path d="M8.5 3C4.92 3 2 5.69 2 9c0 1.77.83 3.36 2.15 4.47L3.5 16l3.09-1.55c.6.2 1.24.34 1.91.4l.12-.16C9 14.23 9 13.62 9 13c0-2.76 2.69-5 6-5 .34 0 .67.03 1 .08C15.36 5.11 12.17 3 8.5 3Z" fill="#fff"/><path d="M16.5 9C13.46 9 11 11.24 11 14s2.46 5 5.5 5c.64 0 1.25-.1 1.82-.27L22 20.5l-.78-2.06A4.87 4.87 0 0 0 22 14c0-2.76-2.46-5-5.5-5Z" fill="#fff"/></svg>'
    };

    var platforms = [
        { id: 'douyin', name: '抖音', logo: LOGOS.douyin, iconCls: 'bg-douyin', desc: '发布视频到抖音', publishMode: 'redirect' },
        { id: 'kuaishou', name: '快手', logo: LOGOS.kuaishou, iconCls: 'bg-kuaishou', desc: '发布视频到快手', publishMode: 'auto' },
        { id: 'xiaohongshu', name: '小红书', logo: LOGOS.xiaohongshu, iconCls: 'bg-xiaohongshu', desc: '发布笔记到小红书', comingSoon: true },
        { id: 'wechat', name: '微信视频号', logo: LOGOS.wechat, iconCls: 'bg-wechat', desc: '发布视频到视频号', comingSoon: true }
    ];

    var BINDING_KEY = 'platformBindingState';

    var defaultState = {
        douyin: { status: 'unbound', userName: '', expireDate: '' },
        kuaishou: { status: 'unbound', userName: '', expireDate: '' },
        xiaohongshu: { status: 'soon' },
        wechat: { status: 'soon' }
    };

    var pendingPlatform = null;

    function getState() {
        try {
            var raw = localStorage.getItem(BINDING_KEY);
            if (raw) {
                var parsed = JSON.parse(raw);
                for (var k in defaultState) { if (!(k in parsed)) parsed[k] = defaultState[k]; }
                return parsed;
            }
        } catch (e) {}
        return JSON.parse(JSON.stringify(defaultState));
    }

    function saveState(state) {
        localStorage.setItem(BINDING_KEY, JSON.stringify(state));
    }

    function renderPlatforms() {
        var state = getState();
        var grid = document.getElementById('platformGrid');
        grid.innerHTML = '';
        platforms.forEach(function(p) {
            var s = state[p.id] || { status: 'unbound' };
            var card = document.createElement('div');
            card.className = 'platform-card';

            var icon = document.createElement('div');
            icon.className = 'platform-icon ' + p.iconCls;
            icon.innerHTML = p.logo;

            var body = document.createElement('div');
            body.className = 'platform-body';

            var nameRow = document.createElement('div');
            nameRow.className = 'platform-name';
            nameRow.textContent = p.name;

            var statusRow = document.createElement('div');
            statusRow.className = 'platform-status';

            var actions = document.createElement('div');
            actions.className = 'platform-actions';

            if (s.status === 'soon') {
                var dot = document.createElement('span');
                dot.className = 'status-dot soon';
                var stxt = document.createElement('span');
                stxt.className = 'status-text soon';
                stxt.textContent = '即将开放';
                statusRow.appendChild(dot);
                statusRow.appendChild(stxt);

                var btn = document.createElement('button');
                btn.className = 'btn btn-disabled';
                btn.textContent = '敬请期待';
                btn.disabled = true;
                actions.appendChild(btn);

            } else if (s.status === 'bound') {
                var dot = document.createElement('span');
                dot.className = 'status-dot bound';
                var stxt = document.createElement('span');
                stxt.className = 'status-text bound';
                stxt.textContent = '已授权';
                statusRow.appendChild(dot);
                statusRow.appendChild(stxt);

                if (s.expireDate) {
                    var expire = document.createElement('span');
                    expire.style.cssText = 'font-size:11px;color:var(--text-muted);margin-left:4px;';
                    expire.textContent = '有效期至 ' + s.expireDate;
                    statusRow.appendChild(expire);
                }

                var badge = document.createElement('span');
                badge.className = 'mode-badge ' + p.publishMode;
                badge.textContent = p.publishMode === 'redirect' ? '跳转确认' : '自动发布';
                statusRow.appendChild(badge);

                var userRow = document.createElement('div');
                userRow.className = 'platform-user';
                var ua = document.createElement('div');
                ua.className = 'platform-user-avatar';
                ua.textContent = s.userName.charAt(0);
                var un = document.createElement('span');
                un.className = 'platform-user-name';
                un.textContent = s.userName;
                userRow.appendChild(ua);
                userRow.appendChild(un);
                body.appendChild(nameRow);
                body.appendChild(statusRow);
                body.appendChild(userRow);

                var syncBtn = document.createElement('button');
                syncBtn.className = 'btn btn-success';
                syncBtn.textContent = '已授权 ✓';
                syncBtn.onclick = function() { showToast('提示', '账号状态正常'); };
                actions.appendChild(syncBtn);

                var unbindBtn = document.createElement('button');
                unbindBtn.className = 'btn btn-ghost';
                unbindBtn.textContent = '解绑';
                unbindBtn.style.marginLeft = '4px';
                unbindBtn.onclick = function() { showUnbindModal(p); };
                actions.appendChild(unbindBtn);

            } else if (s.status === 'expired') {
                var dot = document.createElement('span');
                dot.className = 'status-dot expired';
                var stxt = document.createElement('span');
                stxt.className = 'status-text expired';
                stxt.textContent = '授权已过期';
                statusRow.appendChild(dot);
                statusRow.appendChild(stxt);

                if (s.expireDate) {
                    var expire = document.createElement('span');
                    expire.style.cssText = 'font-size:11px;color:var(--text-muted);margin-left:4px;';
                    expire.textContent = '过期于 ' + s.expireDate;
                    statusRow.appendChild(expire);
                }

                body.appendChild(nameRow);
                body.appendChild(statusRow);

                var authBtn = document.createElement('button');
                authBtn.className = 'btn btn-warning';
                authBtn.textContent = '重新授权';
                authBtn.onclick = function() { showAuthModal(p); };
                actions.appendChild(authBtn);

            } else {
                var dot = document.createElement('span');
                dot.className = 'status-dot unbound';
                var stxt = document.createElement('span');
                stxt.className = 'status-text unbound';
                stxt.textContent = '未绑定';
                statusRow.appendChild(dot);
                statusRow.appendChild(stxt);

                body.appendChild(nameRow);
                body.appendChild(statusRow);

                var authBtn = document.createElement('button');
                authBtn.className = 'btn btn-primary';
                authBtn.textContent = '去授权';
                authBtn.onclick = function() { showAuthModal(p); };
                actions.appendChild(authBtn);
            }

            card.appendChild(icon);
            card.appendChild(body);
            card.appendChild(actions);
            grid.appendChild(card);
        });
    }

    function showAuthModal(platform) {
        pendingPlatform = platform;
        document.getElementById('authModalIcon').innerHTML = platform.logo;
        document.getElementById('authModalIcon').style.background = platform.iconCls === 'bg-douyin' ? '#161823' : platform.iconCls === 'bg-kuaishou' ? 'linear-gradient(135deg,#FF6A00,#EE2D2D)' : platform.iconCls === 'bg-xiaohongshu' ? '#fff' : '#07C160';
        document.getElementById('authModalIcon').style.width = '48px';
        document.getElementById('authModalIcon').style.height = '48px';
        document.getElementById('authModalIcon').style.borderRadius = '12px';
        document.getElementById('authModalIcon').style.display = 'inline-flex';
        document.getElementById('authModalIcon').style.alignItems = 'center';
        document.getElementById('authModalIcon').style.justifyContent = 'center';
        document.getElementById('authModalIcon').style.margin = '0 auto 12px';
        document.getElementById('authModalIcon').style.border = platform.iconCls === 'bg-xiaohongshu' ? '1px solid #eee' : 'none';
        document.getElementById('authModalTitle').textContent = '授权绑定' + platform.name;
        document.getElementById('authModalScopePlatform').textContent = platform.name;

        var descEl = document.getElementById('authModalDesc');
        if (platform.publishMode === 'redirect') {
            descEl.innerHTML = '即将跳转至抖音开放平台授权。<br>发布时需跳转抖音 APP <strong>手动确认发布</strong>，你的平台无法替用户点击发布。';
        } else if (platform.publishMode === 'auto') {
            descEl.innerHTML = '即将跳转至快手开放平台授权。<br>授权后支持 <strong>静默直发</strong>，选择视频后由后台自动完成发布。';
        } else {
            descEl.textContent = '即将跳转到' + platform.name + '开放平台进行授权认证。';
        }

        document.getElementById('authModal').classList.add('show');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
        pendingPlatform = null;
    }

    function confirmAuth() {
        if (!pendingPlatform) return;
        var platform = pendingPlatform;
        closeModal('authModal');

        showToast('跳转中', '正在跳转到' + platform.name + '授权页面...');

        setTimeout(function() {
            var state = getState();
            var now = new Date();
            var days = platform.id === 'douyin' ? 15 : 30;
            now.setDate(now.getDate() + days);
            var expireStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            state[platform.id] = {
                status: 'bound',
                userName: platform.id === 'douyin' ? '抖音用户_顾霖' : '快手用户_顾霖',
                expireDate: expireStr
            };
            saveState(state);
            renderPlatforms();
            showToast('绑定成功', '已成功绑定' + platform.name + '账号。发布时将默认携带 #AI生成 话题。');
        }, 1500);
    }

    function showUnbindModal(platform) {
        pendingPlatform = platform;
        document.getElementById('unbindModalDesc').textContent = '确认解除与「' + platform.name + '」的绑定？解除后需要重新授权才能分发视频。';
        document.getElementById('unbindModal').classList.add('show');
    }

    function confirmUnbind() {
        if (!pendingPlatform) return;
        var platform = pendingPlatform;
        closeModal('unbindModal');

        var state = getState();
        state[platform.id] = { status: 'unbound', userName: '', expireDate: '' };
        saveState(state);
        renderPlatforms();
        showToast('已解绑', '已解除与' + platform.name + '的绑定');
    }

    var toastTimer = null;
    function showToast(title, text) {
        var t = document.getElementById('toast');
        document.getElementById('toastTitle').textContent = title;
        document.getElementById('toastText').textContent = text;
        t.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
    }

    function toggleSection(el) {
        var parent = el.parentElement;
        var children = parent.querySelector('.nav-section-children');
        if (children) {
            el.classList.toggle('collapsed');
            children.classList.toggle('hidden');
        } else {
            var panelId = el.getAttribute('data-panel');
            if (panelId) {
                document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
                document.getElementById(panelId).classList.add('active');
                document.querySelectorAll('.nav-section-title.active').forEach(function(t) { t.classList.remove('active'); });
                el.classList.add('active');
            }
        }
    }

    renderPlatforms();
</script>
</body>
</html>
